services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bigpanda_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: install/Dockerfile.local
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bigpanda_app
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    command: >
      sh -c "npx drizzle-kit migrate && npx tsx scripts/seed-admin.ts"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: install/Dockerfile.local
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bigpanda_app
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    command: npx next dev --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: install/Dockerfile.local
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bigpanda_app
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    command: npx tsx worker/index.ts
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
