  --shadow-edge-right:   -5px 0 20px rgba(0,0,0,.10);

   * SEMANTIC TYPE ROLES

   * ======================================================== */

  --type-body-lg-size:     var(--text-lg);     /* 16 */

  --type-body-sm-size:     var(--text-sm);     /* 12 */

  --type-label-sm-size:    var(--text-sm);     /* 12 semi */
  --type-label-xs-size:    var(--text-xs);     /* 11 semi */

/* ============================================================
 * SEMANTIC TYPOGRAPHY CLASSES
 * "Inter, 1.25 line-height; medium for headings, normal for body"
 * ============================================================ */
.kata-root, body.kata-root {
  font-family: var(--font-default);
  background: var(--color-surface-canvas);
  color: var(--color-on-canvas-default);
  font-size: var(--text-base);
  line-height: 1.25;
  -webkit-font-smoothing: antialiased;
}

/* Headings */
.heading-2xl { font: var(--fw-medium) var(--type-heading-2xl-size)/1.25 var(--font-default); letter-spacing: -0.01em; }
.heading-xl  { font: var(--fw-medium) var(--type-heading-xl-size)/1.25 var(--font-default);  letter-spacing: -0.01em; }
.heading-lg  { font: var(--fw-medium) var(--type-heading-lg-size)/1.25 var(--font-default); }
.heading-md  { font: var(--fw-medium) var(--type-heading-md-size)/1.25 var(--font-default); }
.heading-sm  { font: var(--fw-medium) var(--type-heading-sm-size)/1.25 var(--font-default); }
.heading-xs  { font: var(--fw-semibold) var(--type-heading-xs-size)/1.25 var(--font-default); }

/* Body */
.body-xl { font: var(--fw-normal) var(--type-body-xl-size)/1.5 var(--font-default); }
.body-lg { font: var(--fw-normal) var(--type-body-lg-size)/1.5 var(--font-default); }
.body-md { font: var(--fw-normal) var(--type-body-md-size)/1.45 var(--font-default); }
.body-sm { font: var(--fw-normal) var(--type-body-sm-size)/1.4 var(--font-default); }

/* Labels (UI chrome, table headers, small captions) */
.label-md { font: var(--fw-medium) var(--type-label-md-size)/1.25 var(--font-default); }
.label-sm { font: var(--fw-medium) var(--type-label-sm-size)/1.25 var(--font-default); }
.label-xs { font: var(--fw-semibold) var(--type-label-xs-size)/1.25 var(--font-default); }
.label-md-upper { font: var(--fw-medium) var(--type-label-md-size)/1.25 var(--font-default); text-transform: uppercase; letter-spacing: 0.04em; }
.label-sm-upper { font: var(--fw-medium) var(--type-label-sm-size)/1.25 var(--font-default); text-transform: uppercase; letter-spacing: 0.04em; }

/* Code / data */
.code-md      { font: var(--fw-normal)  var(--text-base)/1.4 var(--font-code); }
.code-md-bold { font: var(--fw-semibold) var(--text-base)/1.4 var(--font-code); }
.code-sm      { font: var(--fw-normal)  var(--text-sm)/1.4 var(--font-code); }

/* Semantic element defaults (use inside .kata-root) */
.kata-root h1 { font: var(--fw-medium) var(--type-heading-xl-size)/1.2 var(--font-default); letter-spacing: -0.01em; }
.kata-root h2 { font: var(--fw-medium) var(--type-heading-lg-size)/1.25 var(--font-default); }
.kata-root h3 { font: var(--fw-medium) var(--type-heading-md-size)/1.25 var(--font-default); }
.kata-root h4 { font: var(--fw-medium) var(--type-heading-sm-size)/1.25 var(--font-default); }
.kata-root h5 { font: var(--fw-semibold) var(--type-heading-xs-size)/1.25 var(--font-default); }
.kata-root p  { font-size: var(--text-base); line-height: 1.45; }
.kata-root code, .kata-root kbd, .kata-root pre, .kata-root samp { font-family: var(--font-code); }
.kata-root small { font-size: var(--text-sm); color: var(--color-on-container-as-secondary); }
.kata-root a { color: var(--color-on-container-as-link-default); text-decoration: none; }
.kata-root a:hover { color: var(--color-on-container-as-link-hover); text-decoration: underline; text-underline-offset: 2px; }

<style>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<!-- Components -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="components/direction-1.jsx"></script>
<script type="text/babel" src="components/direction-2.jsx"></script>
<script type="text/babel" src="components/direction-3.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakColor, TweakToggle } = window;

const PRESETS = {
  blue:    { primary: '#0041F5', primaryHover: '#0030CF', primarySubtle: '#DCE6FF', onPrimarySubtle: '#0030CF', stroke: '#0041F5' },
  indigo:  { primary: '#5B5BFF', primaryHover: '#4646D6', primarySubtle: '#E5E5FF', onPrimarySubtle: '#3838B0', stroke: '#5B5BFF' },
  teal:    { primary: '#0F766E', primaryHover: '#0B5953', primarySubtle: '#CCEBE7', onPrimarySubtle: '#0B5953', stroke: '#0F766E' },
  graphite:{ primary: '#1F2A30', primaryHover: '#0F1518', primarySubtle: '#E2E6E8', onPrimarySubtle: '#1F2A30', stroke: '#1F2A30' },
  panda:   { primary: '#181D1E', primaryHover: '#0B0E0F', primarySubtle: '#E5E7E8', onPrimarySubtle: '#181D1E', stroke: '#181D1E' },
};

function applyTheme(t) {
  const root = document.documentElement;
  const p = PRESETS[t.accent] || PRESETS.blue;
  root.style.setProperty('--color-surface-primary', p.primary);
  root.style.setProperty('--color-surface-primary-hover', p.primaryHover);
  root.style.setProperty('--color-surface-primary-subtle', p.primarySubtle);
  root.style.setProperty('--color-on-primary-subtle', p.onPrimarySubtle);
  root.style.setProperty('--color-on-container-as-link', p.onPrimarySubtle);
  root.style.setProperty('--color-icon-interactive', p.primary);
  root.style.setProperty('--color-stroke-focus', p.primary);
  root.style.setProperty('--color-blue-500', p.primary);
  root.style.setProperty('--color-blue-400', p.primary);
  root.style.setProperty('--color-blue-300', p.primarySubtle);

  if (t.theme === 'dark') {
    root.classList.add('dark');
  } else {
    root.classList.remove('dark');
  }
}

function App() {
  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "theme": "dark",
    "accent": "indigo",
    "showSpec": false
  }/*EDITMODE-END*/);

  React.useEffect(() => { applyTheme(tweaks); }, [tweaks.theme, tweaks.accent]);

  return (
    <>
      <DesignCanvas title="Panda Manager — Modernization" subtitle="3 directions × 2 surfaces · Kata DS">
        <DCSection id="d1" title="Direction 1 — Operator Console" subtitle="Faithful Kata translation. Dark topbar + slim light sidebar, dense tables, semantic colors. Closest to BigPanda's product-suite peers.">
          <DCArtboard id="d1-portfolio" label="Portfolio dashboard" width={1440} height={920}>
            <D1PortfolioDashboard />
          </DCArtboard>
          <DCArtboard id="d1-project" label="Project workspace · Globex" width={1440} height={1180}>
            <D1ProjectWorkspace />
          </DCArtboard>
        </DCSection>

        <DCSection id="d2" title="Direction 2 — Editorial Plan" subtitle="Calmer, PM-tuned. Larger headings, more whitespace, project cards with timeline strips. Editorial dashboard vs. NOC console.">
          <DCArtboard id="d2-portfolio" label="Portfolio dashboard" width={1440} height={1100}>
            <D2PortfolioDashboard />
          </DCArtboard>
          <DCArtboard id="d2-project" label="Project workspace · Globex" width={1440} height={1300}>
            <D2ProjectWorkspace />
          </DCArtboard>
        </DCSection>

        <DCSection id="d3" title="Direction 3 — Command Workspace" subtitle="Three-rail layout. Dark command rail + main + AI assistant rail. Heavy mono numerals. AI is a first-class surface, not a feature.">
          <DCArtboard id="d3-portfolio" label="Portfolio dashboard" width={1520} height={920}>
            <D3PortfolioDashboard />
          </DCArtboard>
          <DCArtboard id="d3-project" label="Project workspace · Globex" width={1520} height={1000}>
            <D3ProjectWorkspace />
          </DCArtboard>
        </DCSection>

        <DCSection id="spec" title="Engineering handoff notes" subtitle="What carries forward regardless of which direction wins.">
          <DCArtboard id="spec-1" label="Token & component spec" width={1100} height={920}>
            <SpecSheet />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            label="Mode"
            value={tweaks.theme}
            onChange={(v) => setTweak('theme', v)}
            options={[
              { label: 'Light', value: 'light' },
              { label: 'Dark',  value: 'dark' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Accent color">
          <TweakRadio
            label="Preset"
            value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={[
              { label: 'BigPanda Blue', value: 'blue' },
              { label: 'Indigo',        value: 'indigo' },
              { label: 'Teal',          value: 'teal' },
              { label: 'Graphite',      value: 'graphite' },
              { label: 'Panda Black',   value: 'panda' },
            ]}
          />
          <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', margin: '8px 0 0', lineHeight: 1.5 }}>
            Recolors the primary, link, and focus-ring tokens across all 3 directions.
            Semantic colors (success/warning/error/AI) stay locked.
          </p>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// ── Spec sheet ──────────────────────────────────────────────────
function SpecSheet() {
  return (
    <div style={{ background: 'var(--color-surface-canvas)', height: '100%', overflow: 'auto', padding: '32px 40px', fontFamily: 'Inter' }}>
      <div className="col" style={{ gap: 6, marginBottom: 24 }}>
        <span className="label-sm-upper" style={{ fontSize: 11, color: 'var(--color-on-container-as-tertiary)' }}>Modernization · spec for engineering</span>
        <h1 style={{ font: '500 28px/1.1 Inter', letterSpacing: '-0.02em', margin: 0 }}>What carries forward regardless of direction</h1>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <div className="card" style={{ padding: 18 }}>
          <span className="label-sm-upper" style={{ fontSize: 10, color: 'var(--color-on-container-as-tertiary)' }}>Tokens</span>
          <h3 style={{ font: '500 16px/1.3 Inter', margin: '6px 0 10px' }}>Replace shadcn defaults with Kata semantic tokens</h3>
          <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.6, color: 'var(--color-on-container-as-secondary)' }}>
            <li><span className="mono" style={{ fontSize: 12 }}>--color-surface-canvas / -container / -field</span> instead of zinc-50/100/200</li>
            <li>Drop ad-hoc <span className="mono" style={{ fontSize: 12 }}>green/yellow/red</span> Tailwind for <span className="mono" style={{ fontSize: 12 }}>surface-success / -warning / -error</span> + <span className="mono" style={{ fontSize: 12 }}>on-*</span> pairs</li>
            <li>Reserve <span className="mono" style={{ fontSize: 12 }}>surface-ai-subtle</span> + <span className="mono" style={{ fontSize: 12 }}>icon-ai</span> for AI-generated content</li>
            <li>One spacing scale: 2px-base, with 8/12/16/24/32 the load-bearing values</li>
          </ul>
        </div>

        <div className="card" style={{ padding: 18 }}>
          <span className="label-sm-upper" style={{ fontSize: 10, color: 'var(--color-on-container-as-tertiary)' }}>Type</span>
          <h3 style={{ font: '500 16px/1.3 Inter', margin: '6px 0 10px' }}>Inter + JetBrains Mono</h3>
          <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.6, color: 'var(--color-on-container-as-secondary)' }}>
            <li>Body 14/1.45, headings 18/22/28/32 with -0.01em to -0.02em tracking</li>
            <li>Mono for IDs, dates, durations, percentages, counts — not for prose</li>
            <li><span className="mono" style={{ fontSize: 12 }}>label-sm-upper</span> (11px, +0.06em) for column heads & metadata</li>
            <li>Drop system-ui — pin Inter via <span className="mono" style={{ fontSize: 12 }}>@fontsource/inter</span></li>
          </ul>
        </div>

        <div className="card" style={{ padding: 18 }}>
          <span className="label-sm-upper" style={{ fontSize: 10, color: 'var(--color-on-container-as-tertiary)' }}>Components to replace</span>
          <h3 style={{ font: '500 16px/1.3 Inter', margin: '6px 0 10px' }}>Lift from <span className="mono" style={{ fontSize: 14 }}>@kata/ui</span></h3>
          <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.6, color: 'var(--color-on-container-as-secondary)' }}>
            <li><span className="mono" style={{ fontSize: 12 }}>Button</span>, <span className="mono" style={{ fontSize: 12 }}>Badge</span>, <span className="mono" style={{ fontSize: 12 }}>Card</span>, <span className="mono" style={{ fontSize: 12 }}>Table</span> — primary value in adopting</li>
            <li><span className="mono" style={{ fontSize: 12 }}>Sidebar</span> + <span className="mono" style={{ fontSize: 12 }}>Topbar</span> from <span className="mono" style={{ fontSize: 12 }}>@kata/components</span></li>
            <li><span className="mono" style={{ fontSize: 12 }}>Sonner</span> for toasts; remove custom toast hooks</li>
            <li>Use <span className="mono" style={{ fontSize: 12 }}>@kata/icons</span> (Material Symbols Outlined 400) instead of Lucide</li>
          </ul>
        </div>

        <div className="card" style={{ padding: 18 }}>
          <span className="label-sm-upper" style={{ fontSize: 10, color: 'var(--color-on-container-as-tertiary)' }}>Information patterns</span>
          <h3 style={{ font: '500 16px/1.3 Inter', margin: '6px 0 10px' }}>Density & rhythm</h3>
          <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.6, color: 'var(--color-on-container-as-secondary)' }}>
            <li>Tables: 44px rows (Kata default 20px is too dense for PM use); column heads in <span className="mono" style={{ fontSize: 12 }}>label-sm-upper</span></li>
            <li>Status: dot + label badge, never "color-only"</li>
            <li>Cards: 12px radius, hairline border, subtle <span className="mono" style={{ fontSize: 12 }}>shadow-raised</span></li>
            <li>Health = RAG dot + named badge (Healthy/At risk/Critical) — never just a color</li>
          </ul>
        </div>

        <div className="card" style={{ padding: 18, gridColumn: 'span 2' }}>
          <span className="label-sm-upper" style={{ fontSize: 10, color: 'var(--color-on-container-as-tertiary)' }}>AI surface treatment</span>
          <h3 style={{ font: '500 16px/1.3 Inter', margin: '6px 0 10px' }}>The new "AI assistant" needs design conventions, not just a model</h3>
          <ul style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.6, color: 'var(--color-on-container-as-secondary)' }}>
            <li>Always flag AI-generated content with <span className="mono" style={{ fontSize: 12 }}>auto_awesome</span> icon + purple <span className="mono" style={{ fontSize: 12 }}>surface-ai-subtle</span> background or border. Never invisible.</li>
            <li>Show provenance and freshness: "Generated 14m ago · claude-sonnet-4.5" — operators trust what they can audit.</li>
            <li>AI suggestions get an <b>Accept / Dismiss / Edit</b> trio. Never auto-apply without explicit acceptance.</li>
            <li>Direction 3 treats AI as a <b>scoped sidebar</b> (per-project context); D1/D2 surface AI as <b>inline cards</b>. Both work — pick one and commit.</li>
          </ul>
        </div>

        <div className="card" style={{ padding: 18, gridColumn: 'span 2', borderColor: 'var(--color-stroke-warning)' }}>
          <span className="label-sm-upper" style={{ fontSize: 10, color: 'var(--color-on-container-as-warning)' }}>Migration path</span>
          <h3 style={{ font: '500 16px/1.3 Inter', margin: '6px 0 10px' }}>Suggested order — minimize churn</h3>
          <ol style={{ margin: 0, padding: '0 0 0 18px', fontSize: 13, lineHeight: 1.7, color: 'var(--color-on-container-as-secondary)' }}>
            <li><b>Tokens first</b> — drop in <span className="mono" style={{ fontSize: 12 }}>kata-tokens.css</span>, alias old vars. ~1 day, no visible regressions.</li>
            <li><b>Type & icons</b> — switch fonts + replace Lucide. Mostly mechanical. ~2 days.</li>
            <li><b>Chrome</b> — Topbar + Sidebar from <span className="mono" style={{ fontSize: 12 }}>@kata/components</span>. Highest visible-impact change. ~3 days.</li>
            <li><b>Tables & cards</b> — adopt Kata primitives screen by screen. ~1 week, parallelizable.</li>
            <li><b>AI surface</b> — depends on chosen direction. Plan as its own epic.</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
